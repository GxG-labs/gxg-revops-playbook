revops_domain_tree:
  version: 1
  title: "RevOps Domain Tree — Marketing & Sales"
  updated: "2026-06-10"

  domains:

    - id: demand_gen
      name: Demand Generation
      description: Все активности по привлечению и конвертации лидов — inbound и outbound.
      subdomains:

        - id: inbound_marketing
          name: Inbound Marketing
          description: Привлечение через контент, SEO, органику и brand awareness.
          subdomains:
            - id: seo_organic
              name: SEO & Organic
              description: Оптимизация под поисковый спрос, органический трафик и ссылочная масса.
            - id: brand_awareness
              name: Brand & Awareness
              description: Позиционирование, PR, community building и thought leadership.
            - id: events_webinars
              name: Events & Webinars
              description: Онлайн и офлайн мероприятия как канал лидогенерации и прогрева.

        - id: outbound
          name: Outbound Prospecting
          description: Исходящий поиск и квалификация потенциальных клиентов.
          subdomains:
            - id: cold_outreach
              name: Cold Outreach
              description: Email, LinkedIn и мультиканальные холодные последовательности.
            - id: abm
              name: Account-Based Marketing
              description: Персонализированные кампании на целевые аккаунты (1:1, 1:few, 1:many).
            - id: signal_prospecting
              name: Signal-Based Prospecting
              description: Триггерный аутрич на основе intent-сигналов и data-enrichment.

        - id: paid_acquisition
          name: Paid Acquisition
          description: Платные каналы привлечения — paid social, PPC, influence, affiliate.
          subdomains:
            - id: paid_social
              name: Paid Social
              description: Таргетированная реклама в LinkedIn, Meta, YouTube и других соцсетях.
            - id: ppc_sem
              name: PPC & SEM
              description: Контекстная и поисковая реклама Google, Bing и аналогов.
            - id: influencer_affiliate
              name: Influencer & Affiliate
              description: Партнёрский маркетинг через блогеров, KOL и аффилиатов.

    - id: content_ops
      name: Content Operations
      description: Создание, управление и дистрибуция контента как канала роста и доверия.
      subdomains:

        - id: content_strategy
          name: Content Strategy
          description: ICP-based планирование тем, форматов, editorial calendar и контент-воронки.

        - id: content_creation
          name: Content Creation
          description: Производство текста, видео, подкастов и визуального контента.
          subdomains:
            - id: written_content
              name: Written Content
              description: Статьи, кейсы, white papers, thought leadership и long-form SEO.
            - id: video_audio
              name: Video & Audio
              description: Видеоролики, подкасты, вебинары, short-form видео (reels, shorts).
            - id: social_content
              name: Social Media Content
              description: Posts, threads, carousels, stories — адаптация под форматы соцсетей.

        - id: content_distribution
          name: Content Distribution
          description: Каналы публикации, продвижения и переупаковки готового контента.
          subdomains:
            - id: email_newsletter
              name: Email & Newsletter
              description: Рассылки, nurture-последовательности, newsletter как owned media.
            - id: social_channels
              name: Social Channels
              description: Публикации и органический рост в LinkedIn, X, Instagram и других.
            - id: syndication_repurpose
              name: Syndication & Repurpose
              description: Переупаковка контента, репосты, guest posting, content atomization.

    - id: sales
      name: Sales
      description: Все процессы превращения лидов в клиентов — от первого касания до закрытия.
      subdomains:

        - id: sales_development
          name: Sales Development (SDR)
          description: Квалификация лидов и выход на ЛПР — outbound и inbound SDR.
          subdomains:
            - id: lead_qualification
              name: Lead Qualification
              description: ICP-скоринг, BANT/MEDDIC-фреймворки, квалификация входящих заявок.
            - id: outreach_sequences
              name: Outreach Sequences
              description: Мультиканальные последовательности касаний для назначения встреч.
            - id: personalization
              name: AI Personalization
              description: Гиперперсонализация сообщений с помощью AI и data-enrichment.

        - id: pipeline_management
          name: Pipeline Management
          description: Ведение сделок от первой встречи до подписания контракта.
          subdomains:
            - id: deal_management
              name: Deal Management
              description: Прогресс по стадиям воронки, работа с возражениями, stakeholder-карты.
            - id: forecasting
              name: Sales Forecasting
              description: Точность прогнозов, pipeline hygiene, commit vs. best case.
            - id: crm_management
              name: CRM Management
              description: Дисциплина ведения CRM, чистота данных, автоматизация записей.

        - id: sales_enablement
          name: Sales Enablement
          description: Всё, что помогает продавцам продавать быстрее и с более высоким win rate.
          subdomains:
            - id: sales_content
              name: Sales Content
              description: Deck, battle cards, case studies, ROI-калькуляторы, demo-материалы.
            - id: playbooks_training
              name: Playbooks & Training
              description: Сценарии разговоров, objection handling, onboarding продавцов.
            - id: sales_tools
              name: Sales Tools & Stack
              description: Инструменты продавца — диалер, email-трекинг, intent-data, AI-копилоты.

    - id: growth_marketing
      name: Growth Marketing
      description: Конверсия, удержание и механики роста — эксперименты и lifecycle marketing.
      subdomains:

        - id: conversion_optimization
          name: Conversion Optimization
          description: CRO, A/B тесты, landing page оптимизация, улучшение форм и CTA.

        - id: lifecycle_marketing
          name: Lifecycle & Retention
          description: Onboarding, nurturing, upsell — работа с текущей пользовательской базой.
          subdomains:
            - id: email_automation
              name: Email Automation
              description: Триггерные цепочки, behavioural emails, life-cycle sequences.
            - id: product_led_growth
              name: Product-Led Growth
              description: Virality loops, freemium, self-serve онбординг и in-product activation.
            - id: customer_expansion
              name: Customer Expansion
              description: Upsell, cross-sell, referral программы и community-led growth.

        - id: analytics_attribution
          name: Analytics & Attribution
          description: Измерение эффективности каналов, атрибуция выручки и growth-метрики.
          subdomains:
            - id: web_analytics
              name: Web Analytics
              description: GA4, heatmaps, session recording, funnel analysis, UTM-трекинг.
            - id: revenue_attribution
              name: Revenue Attribution
              description: Multi-touch attribution, source tracking, CAC и ROI по каналам.

    - id: revenue_ops
      name: Revenue Operations
      description: Операционный хребет GTM — данные, процессы, автоматизация и технологический стек.
      subdomains:

        - id: gtm_ops
          name: GTM Operations
          description: Процессы и операционная модель go-to-market функций.
          subdomains:
            - id: lead_routing
              name: Lead Routing & SLA
              description: Правила маршрутизации лидов, SLA, handoff маркетинг → продажи.
            - id: territory_planning
              name: Territory & Quota Planning
              description: Сегментация рынка, распределение территорий, постановка планов продаж.
            - id: go_to_market_strategy
              name: GTM Strategy
              description: ICP, positioning, messaging, GTM-motion (PLG, sales-led, hybrid, channel).

        - id: data_intelligence
          name: Data & Intelligence
          description: Качество данных, enrichment, revenue intelligence и market insights.
          subdomains:
            - id: data_enrichment
              name: Data Enrichment
              description: Обогащение контактов и аккаунтов — technographic, firmographic, intent.
            - id: revenue_intelligence
              name: Revenue Intelligence
              description: Conversation intelligence, deal scoring, pipeline risk AI.
            - id: market_intelligence
              name: Market Intelligence
              description: Конкурентный анализ, ICP-исследование, trends и win/loss анализ.

        - id: tech_stack
          name: Tech Stack & Automation
          description: Маркетинговый и продажный стек — инструменты, интеграции, AI-автоматизация.
          subdomains:
            - id: crm_platform
              name: CRM Platform
              description: Выбор, настройка и оптимизация CRM (Salesforce, HubSpot, Pipedrive и др.).
            - id: marketing_automation
              name: Marketing Automation
              description: MAP-системы, workflow automation, lead scoring, nurture-программы.
            - id: ai_automation
              name: AI & Workflow Automation
              description: AI-агенты, no-code автоматизации и интеграции в GTM-процессах.
